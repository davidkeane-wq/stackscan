<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackScan Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <h1>StackScan Dashboard</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('scans')">Scan Reports</button>
    <button class="tab" onclick="showTab('pipelines')">Pipeline Runs</button>
  </div>

  <!-- Scans tab -->
  <div id="tab-scans">
    <div class="search-bar">
      <button onclick="loadScans()">Refresh</button>
      <div class="spinner" id="scansSpinner"></div>
    </div>
    <div id="scansMessage"></div>
    <div id="scansList"></div>
  </div>

  <!-- Pipelines tab -->
  <div id="tab-pipelines" style="display:none">
    <div class="search-bar">
      <input id="owner" type="text" placeholder="owner" autocomplete="off" />
      <input id="repo"  type="text" placeholder="repo"  autocomplete="off" />
      <button id="fetchBtn" onclick="fetchRuns()">Fetch runs</button>
      <div class="spinner" id="spinner"></div>
    </div>
    <div id="message"></div>
    <div class="table-wrap">
      <table id="runsTable" style="display:none">
        <thead>
          <tr>
            <th>Run name</th>
            <th>Status</th>
            <th>Conclusion</th>
            <th>Branch</th>
            <th>Event</th>
            <th>Started</th>
          </tr>
        </thead>
        <tbody id="runsBody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>loadScans();</script>
</body>
</html>
