name: StackScan CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY:   australia-southeast1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY: stackscan
  IMAGE:      stackscan-app

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest

  # ── 2. Build & push dashboard image ───────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev

      - name: Build & push
        run: |
          docker build \
            -t $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            -t $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:latest \
            .
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:latest

  # ── 3. Security scan via stackscan action ─────────────────────────────────
  security-scan:
    name: AI Security Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Run StackScan
        id: scan
        uses: ./
        with:
          target_dir: "."
          dashboard_url: ${{ secrets.DASHBOARD_URL }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Print report URL
        run: echo "Scan report → ${{ steps.scan.outputs.report_url }}"

  # ── 4. Deploy dashboard to Cloud Run ──────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: stackscan
          region: australia-southeast1
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            DASHBOARD_TOKEN=${{ secrets.DASHBOARD_TOKEN }}
            DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
            SCAN_RESULTS_BUCKET=${{ secrets.SCAN_RESULTS_BUCKET }}
